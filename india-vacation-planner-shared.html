<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Summer Vacation Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .status-indicator {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .status-synced {
            background: #d4edda;
            color: #155724;
        }

        .status-loading {
            background: #fff3cd;
            color: #856404;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input[type="text"],
        input[type="url"],
        input[type="date"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .item-title {
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .item-link {
            color: #667eea;
            text-decoration: none;
            word-break: break-all;
            display: block;
            margin-top: 5px;
        }

        .item-link:hover {
            text-decoration: underline;
        }

        .delete-btn {
            background: #e74c3c;
            padding: 6px 12px;
            font-size: 12px;
            margin-left: 10px;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .event-item {
            background: #f8f9fa;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .event-date {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }

        .event-activity {
            color: #333;
        }

        .suggestion-item {
            background: #fff9e6;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #f39c12;
        }

        .suggestion-author {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
            font-style: italic;
        }

        .refresh-btn {
            background: #3498db;
            padding: 8px 16px;
            font-size: 14px;
            margin-top: 10px;
        }

        .refresh-btn:hover {
            background: #2980b9;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🇮🇳 India Summer Vacation Planner</h1>
            <p class="subtitle">Plan together, travel better</p>
            <div id="statusIndicator" class="status-indicator status-loading">Loading...</div>
            <div style="margin-top: 10px; font-size: 0.9em; color: #666;">
                <em>All changes are automatically shared with everyone!</em>
            </div>
        </header>

        <div class="grid">
            <!-- Useful Links Section -->
            <div class="card">
                <h2>📎 Useful Links</h2>
                <div class="input-group">
                    <input type="text" id="linkTitle" placeholder="Link title (e.g., Hotel Booking)">
                </div>
                <div class="input-group">
                    <input type="url" id="linkUrl" placeholder="URL (e.g., https://...)">
                </div>
                <button onclick="addLink()">Add Link</button>
                <button class="refresh-btn" onclick="loadAllData()">Refresh</button>
                <div id="linksList" style="margin-top: 20px;">
                    <div class="empty-state">Loading links...</div>
                </div>
            </div>

            <!-- Calendar Section -->
            <div class="card">
                <h2>📅 Trip Calendar</h2>
                <div class="input-group">
                    <input type="date" id="eventDate">
                </div>
                <div class="input-group">
                    <input type="text" id="eventActivity" placeholder="Activity/Event">
                </div>
                <button onclick="addEvent()">Add to Calendar</button>
                <button class="refresh-btn" onclick="loadAllData()">Refresh</button>
                <div id="eventsList" style="margin-top: 20px;">
                    <div class="empty-state">Loading events...</div>
                </div>
            </div>

            <!-- Suggestion Box Section -->
            <div class="card">
                <h2>💡 Suggestion Box</h2>
                <div class="input-group">
                    <input type="text" id="suggestionName" placeholder="Your name">
                </div>
                <div class="input-group">
                    <textarea id="suggestionText" placeholder="Suggest an activity, place to visit, or restaurant..."></textarea>
                </div>
                <button onclick="addSuggestion()">Submit Suggestion</button>
                <button class="refresh-btn" onclick="loadAllData()">Refresh</button>
                <div id="suggestionsList" style="margin-top: 20px;">
                    <div class="empty-state">Loading suggestions...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check if storage API is available
        const hasStorage = typeof window.storage !== 'undefined';
        
        // Data storage keys
        const STORAGE_KEYS = {
            links: 'india-trip-links',
            events: 'india-trip-events',
            suggestions: 'india-trip-suggestions'
        };

        // In-memory data
        let links = [];
        let events = [];
        let suggestions = [];

        // Initialize the page
        async function init() {
            updateStatus('loading', 'Loading data...');
            await loadAllData();
            updateStatus('synced', 'Synced ✓');
        }

        function updateStatus(type, message) {
            const indicator = document.getElementById('statusIndicator');
            indicator.className = `status-indicator status-${type}`;
            indicator.textContent = message;
        }

        async function loadAllData() {
            try {
                updateStatus('loading', 'Syncing...');
                
                if (hasStorage) {
                    // Load from shared storage
                    const [linksResult, eventsResult, suggestionsResult] = await Promise.all([
                        window.storage.get(STORAGE_KEYS.links, true).catch(() => null),
                        window.storage.get(STORAGE_KEYS.events, true).catch(() => null),
                        window.storage.get(STORAGE_KEYS.suggestions, true).catch(() => null)
                    ]);

                    links = linksResult ? JSON.parse(linksResult.value) : [];
                    events = eventsResult ? JSON.parse(eventsResult.value) : [];
                    suggestions = suggestionsResult ? JSON.parse(suggestionsResult.value) : [];
                } else {
                    // Fallback to localStorage
                    links = JSON.parse(localStorage.getItem('indiaLinks') || '[]');
                    events = JSON.parse(localStorage.getItem('indiaEvents') || '[]');
                    suggestions = JSON.parse(localStorage.getItem('indiaSuggestions') || '[]');
                }

                renderLinks();
                renderEvents();
                renderSuggestions();
                updateStatus('synced', 'Synced ✓');
            } catch (error) {
                console.error('Error loading data:', error);
                updateStatus('error', 'Error loading data');
            }
        }

        async function saveData(key, data) {
            try {
                if (hasStorage) {
                    await window.storage.set(key, JSON.stringify(data), true);
                } else {
                    // Fallback to localStorage
                    const localKey = key.replace('india-trip-', 'india');
                    localStorage.setItem(localKey, JSON.stringify(data));
                }
            } catch (error) {
                console.error('Error saving data:', error);
                updateStatus('error', 'Error saving');
                throw error;
            }
        }

        async function addLink() {
            const title = document.getElementById('linkTitle').value.trim();
            const url = document.getElementById('linkUrl').value.trim();

            if (!title || !url) {
                alert('Please fill in both title and URL');
                return;
            }

            updateStatus('loading', 'Saving...');
            
            links.push({ title, url, id: Date.now() });
            await saveData(STORAGE_KEYS.links, links);
            
            document.getElementById('linkTitle').value = '';
            document.getElementById('linkUrl').value = '';
            
            renderLinks();
            updateStatus('synced', 'Synced ✓');
        }

        async function deleteLink(id) {
            if (!confirm('Delete this link?')) return;
            
            updateStatus('loading', 'Deleting...');
            links = links.filter(link => link.id !== id);
            await saveData(STORAGE_KEYS.links, links);
            renderLinks();
            updateStatus('synced', 'Synced ✓');
        }

        function renderLinks() {
            const container = document.getElementById('linksList');
            
            if (links.length === 0) {
                container.innerHTML = '<div class="empty-state">No links added yet</div>';
                return;
            }

            container.innerHTML = links.map(link => `
                <div class="item">
                    <div class="item-header">
                        <div class="item-title">${escapeHtml(link.title)}</div>
                        <button class="delete-btn" onclick="deleteLink(${link.id})">Delete</button>
                    </div>
                    <a href="${escapeHtml(link.url)}" target="_blank" class="item-link">${escapeHtml(link.url)}</a>
                </div>
            `).join('');
        }

        async function addEvent() {
            const date = document.getElementById('eventDate').value;
            const activity = document.getElementById('eventActivity').value.trim();

            if (!date || !activity) {
                alert('Please fill in both date and activity');
                return;
            }

            updateStatus('loading', 'Saving...');

            events.push({ date, activity, id: Date.now() });
            events.sort((a, b) => new Date(a.date) - new Date(b.date));
            await saveData(STORAGE_KEYS.events, events);
            
            document.getElementById('eventDate').value = '';
            document.getElementById('eventActivity').value = '';
            
            renderEvents();
            updateStatus('synced', 'Synced ✓');
        }

        async function deleteEvent(id) {
            if (!confirm('Delete this event?')) return;
            
            updateStatus('loading', 'Deleting...');
            events = events.filter(event => event.id !== id);
            await saveData(STORAGE_KEYS.events, events);
            renderEvents();
            updateStatus('synced', 'Synced ✓');
        }

        function renderEvents() {
            const container = document.getElementById('eventsList');
            
            if (events.length === 0) {
                container.innerHTML = '<div class="empty-state">No events scheduled yet</div>';
                return;
            }

            container.innerHTML = events.map(event => {
                const dateObj = new Date(event.date + 'T00:00:00');
                const formattedDate = dateObj.toLocaleDateString('en-US', { 
                    weekday: 'short', 
                    year: 'numeric', 
                    month: 'short', 
                    day: 'numeric' 
                });
                
                return `
                    <div class="event-item">
                        <div class="item-header">
                            <div>
                                <div class="event-date">${formattedDate}</div>
                                <div class="event-activity">${escapeHtml(event.activity)}</div>
                            </div>
                            <button class="delete-btn" onclick="deleteEvent(${event.id})">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function addSuggestion() {
            const name = document.getElementById('suggestionName').value.trim();
            const text = document.getElementById('suggestionText').value.trim();

            if (!name || !text) {
                alert('Please fill in both name and suggestion');
                return;
            }

            updateStatus('loading', 'Saving...');

            suggestions.push({ 
                name, 
                text, 
                id: Date.now(), 
                date: new Date().toLocaleDateString() 
            });
            await saveData(STORAGE_KEYS.suggestions, suggestions);
            
            document.getElementById('suggestionName').value = '';
            document.getElementById('suggestionText').value = '';
            
            renderSuggestions();
            updateStatus('synced', 'Synced ✓');
        }

        async function deleteSuggestion(id) {
            if (!confirm('Delete this suggestion?')) return;
            
            updateStatus('loading', 'Deleting...');
            suggestions = suggestions.filter(suggestion => suggestion.id !== id);
            await saveData(STORAGE_KEYS.suggestions, suggestions);
            renderSuggestions();
            updateStatus('synced', 'Synced ✓');
        }

        function renderSuggestions() {
            const container = document.getElementById('suggestionsList');
            
            if (suggestions.length === 0) {
                container.innerHTML = '<div class="empty-state">No suggestions yet</div>';
                return;
            }

            container.innerHTML = suggestions.map(suggestion => `
                <div class="suggestion-item">
                    <div class="item-header">
                        <div style="flex: 1;">
                            <div style="color: #333; margin-bottom: 8px;">${escapeHtml(suggestion.text)}</div>
                            <div class="suggestion-author">Suggested by ${escapeHtml(suggestion.name)} on ${suggestion.date}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteSuggestion(${suggestion.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize on page load
        init();

        // Auto-refresh every 30 seconds to get updates from others
        setInterval(loadAllData, 30000);
    </script>
</body>
</html>
